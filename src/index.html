<body class="mat-typography light-theme">
  <app-root>
    <style>
      .loader-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(249, 250, 251, 0.95);
        backdrop-filter: blur(4px);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
      }

      .loader {
        background: transparent;
        border-radius: 1rem;
        padding: 2rem;
        max-width: 300px;
        width: 90%;
        text-align: center;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1rem;
      }

      .spinner {
        width: 48px;
        height: 48px;
        border: 4px solid #e5e7eb;
        border-top: 4px solid #46777f;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }

      .loader-message {
        font-family: 'Poppins', sans-serif;
        font-weight: 500;
        font-size: 1.125rem;
        color: #1f2937;
        margin: 0;
      }

      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }

        100% {
          transform: rotate(360deg);
        }
      }

      /* Mobile responsive */
      @media (max-width: 768px) {
        .loader {
          padding: 1.5rem;
          margin: 1rem;
        }

        .loader-message {
          font-size: 1rem;
        }
      }
    </style>

    <div class="loader-overlay">
      <div class="loader">
        <div class="spinner"></div>
        <p class="loader-message">Loading...</p>
      </div>
    </div>

  </app-root>
  <noscript>Please enable JavaScript to continue using this application.</noscript>
</body>
