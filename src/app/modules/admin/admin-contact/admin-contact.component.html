<div class="contact-container">
    <div *ngIf="isLoading" class="loading-spinner">
        <mat-spinner diameter="40"></mat-spinner>
    </div>

    <div *ngIf="!isLoading && contactList.length === 0" class="no-data">
        <mat-icon>inbox</mat-icon>
        <p>No contact messages found.</p>
    </div>

    <div *ngIf="!isLoading && contactList.length > 0" class="table-container">
        <table mat-table [dataSource]="contactList" class="mat-elevation-z8">

            <!-- Status Column -->
            <ng-container matColumnDef="status">
                <th mat-header-cell *matHeaderCellDef> Status </th>
                <td mat-cell *matCellDef="let element">
                    <mat-chip-listbox>
                        <mat-chip-option
                            [color]="element.status === 'new' ? 'warn' : (element.status === 'replied' ? 'primary' : 'accent')"
                            selected>
                            {{element.status | titlecase}}
                        </mat-chip-option>
                    </mat-chip-listbox>
                </td>
            </ng-container>

            <!-- Name Column -->
            <ng-container matColumnDef="name">
                <th mat-header-cell *matHeaderCellDef> Name </th>
                <td mat-cell *matCellDef="let element"> {{element.name}} </td>
            </ng-container>

            <!-- Email Column -->
            <ng-container matColumnDef="email">
                <th mat-header-cell *matHeaderCellDef> Email </th>
                <td mat-cell *matCellDef="let element"> {{element.email}} </td>
            </ng-container>

            <!-- Message Column -->
            <ng-container matColumnDef="message">
                <th mat-header-cell *matHeaderCellDef> Message </th>
                <td mat-cell *matCellDef="let element" class="message-cell">
                    {{element.message}}
                </td>
            </ng-container>

            <!-- Date Column -->
            <ng-container matColumnDef="date">
                <th mat-header-cell *matHeaderCellDef> Date </th>
                <td mat-cell *matCellDef="let element"> {{formatDate(element.createdAt || element.updatedAt)}} </td>
            </ng-container>

            <!-- Actions Column -->
            <ng-container matColumnDef="actions">
                <th mat-header-cell *matHeaderCellDef> Actions </th>
                <td mat-cell *matCellDef="let element">
                    <button mat-icon-button [matMenuTriggerFor]="menu">
                        <mat-icon>more_vert</mat-icon>
                    </button>
                    <mat-menu #menu="matMenu">
                        <button mat-menu-item (click)="updateStatus(element, 'read')">
                            <mat-icon>mark_email_read</mat-icon>
                            <span>Mark as Read</span>
                        </button>
                        <button mat-menu-item (click)="updateStatus(element, 'replied')">
                            <mat-icon>reply</mat-icon>
                            <span>Mark as Replied</span>
                        </button>
                    </mat-menu>
                </td>
            </ng-container>

            <tr mat-header-row *matHeaderRowDef="['status', 'name', 'email', 'message', 'date', 'actions']"></tr>
            <tr mat-row *matRowDef="let row; columns: ['status', 'name', 'email', 'message', 'date', 'actions'];"></tr>
        </table>
    </div>
</div>
