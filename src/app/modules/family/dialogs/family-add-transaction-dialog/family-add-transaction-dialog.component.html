<div class="p-6 min-w-[340px]">
  <!-- Header -->
  <div class="flex items-center justify-between mb-5">
    <h2 class="text-lg font-bold text-gray-900 dark:text-white m-0">
      {{ isEditing ? 'Edit' : 'Add' }} Transaction
    </h2>
    <button mat-icon-button (click)="close()"><mat-icon>close</mat-icon></button>
  </div>

  <!-- Type Toggle -->
  <mat-button-toggle-group [formControl]="typeControl" class="w-full mb-4 !rounded-xl overflow-hidden">
    <mat-button-toggle value="expense" class="flex-1">
      <mat-icon class="!text-base mr-1 text-red-500">arrow_downward</mat-icon>
      Expense
    </mat-button-toggle>
    <mat-button-toggle value="income" class="flex-1">
      <mat-icon class="!text-base mr-1 text-green-500">arrow_upward</mat-icon>
      Income
    </mat-button-toggle>
  </mat-button-toggle-group>

  <form [formGroup]="form" class="flex flex-col gap-3">
    <!-- Amount -->
    <mat-form-field appearance="fill">
      <mat-label>Amount</mat-label>
      <input matInput type="number" formControlName="amount" placeholder="0.00" min="0.01" />
      <mat-error>Enter a valid amount</mat-error>
    </mat-form-field>

    <!-- Category -->
    <mat-form-field appearance="fill">
      <mat-label>Category</mat-label>
      <mat-select formControlName="category">
        @for (cat of categories(); track cat) {
          <mat-option [value]="cat">{{ cat }}</mat-option>
        }
      </mat-select>
      <mat-error>Select a category</mat-error>
    </mat-form-field>

    <!-- Date -->
    <mat-form-field appearance="fill">
      <mat-label>Date</mat-label>
      <input matInput [matDatepicker]="picker" formControlName="date" />
      <mat-datepicker-toggle matSuffix [for]="picker"></mat-datepicker-toggle>
      <mat-datepicker #picker></mat-datepicker>
    </mat-form-field>

    <!-- Note -->
    <mat-form-field appearance="fill">
      <mat-label>Note (optional)</mat-label>
      <input matInput formControlName="note" placeholder="What was this for?" />
    </mat-form-field>

    <div class="flex gap-3 mt-1">
      <button mat-stroked-button type="button" class="flex-1" (click)="close()">Cancel</button>
      <button mat-flat-button [color]="typeControl.value === 'expense' ? 'warn' : 'primary'" type="button"
        class="flex-1" [disabled]="form.invalid" (click)="submit()">
        <mat-icon class="!text-base mr-1">{{ isEditing ? 'save' : 'add' }}</mat-icon>
        {{ isEditing ? 'Update' : 'Add' }}
      </button>
    </div>
  </form>
</div>
