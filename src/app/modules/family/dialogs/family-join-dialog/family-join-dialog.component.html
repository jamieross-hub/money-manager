<div class="p-6 min-w-[320px]">
  <div class="flex items-start gap-3 mb-6">
    <div class="w-10 h-10 rounded-full bg-green-100 dark:bg-green-900 flex items-center justify-center !mb-0">
      <mat-icon class="text-green-600 dark:text-green-300">group_add</mat-icon>
    </div>
    <div>
      <p class="text-lg font-bold text-gray-900 dark:text-white !mb-0">Join Group</p>
      <p class="text-xs text-gray-500 dark:text-gray-400 m-0">Enter the invite code from your group</p>
    </div>
  </div>

  <form [formGroup]="form" class="flex flex-col gap-4">
    <mat-form-field appearance="fill" class="w-full">
      <mat-label>Invite Code</mat-label>
      <div class="flex items-center justify-center w-full">
       
        <input matInput formControlName="inviteCode"
          placeholder="XXXX"
          maxlength="4"
          class="uppercase tracking-[0.3em] text-xl font-bold !text-center"
          (input)="onCodeInput($event)" />
      </div>
      <mat-hint align="end">Enter the 4 characters after FAM-</mat-hint>
      <mat-error *ngIf="form.get('inviteCode')?.hasError('required')">Code is required</mat-error>
      <mat-error *ngIf="form.get('inviteCode')?.hasError('pattern')">Invalid format. Use 4 characters (e.g. AB12)</mat-error>
    </mat-form-field>

    <div class="flex gap-3 mt-2">
      <button mat-stroked-button type="button" class="flex-1" (click)="close()">Cancel</button>
      <button mat-flat-button color="primary" type="button" class="flex-1" [disabled]="form.invalid" (click)="submit()">
        <mat-icon class="!text-base !h-[21px] !w-4 mb-2">login</mat-icon>
        Join
      </button>
    </div>
  </form>
</div>
