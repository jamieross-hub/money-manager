<div class="min-h-screen bg-gray-50 dark:bg-gray-900 pb-20">

  <!-- Header -->
  <div class="bg-white dark:bg-gray-800 px-4 pt-5 pb-4 border-b border-gray-100 dark:border-gray-700 shadow-sm">
    <h1 class="text-xl font-bold text-gray-900 dark:text-white">Family Members</h1>
    <p class="text-xs text-gray-500 dark:text-gray-400 mt-1">{{ members().length }} members</p>

    <!-- Invite Code Banner -->
    <div *ngIf="family()" class="mt-3 bg-primary-50 dark:bg-primary-900/20 rounded-xl p-4 border border-primary-100 dark:border-primary-800">
      <p class="text-xs text-gray-500 dark:text-gray-400 mb-1">Share this invite code to add members</p>
      <div class="flex items-center justify-between">
        <span class="text-2xl font-black tracking-widest text-primary-700 dark:text-primary-300">
          {{ family().inviteCode }}
        </span>
        <button mat-stroked-button class="!text-xs !h-8" (click)="copyCode()">
          <mat-icon class="!text-base mr-1">content_copy</mat-icon>
          Copy
        </button>
      </div>
    </div>
  </div>

  <!-- Loading -->
  <div *ngIf="loading()" class="flex justify-center py-10"><mat-spinner diameter="32"></mat-spinner></div>

  <!-- Members List -->
  <div class="px-4 mt-4 space-y-3" *ngIf="!loading()">
    <div *ngFor="let member of members()"
      class="flex items-center gap-3 bg-white dark:bg-gray-800 rounded-xl px-4 py-4 shadow-sm border border-gray-100 dark:border-gray-700">

      <!-- Avatar -->
      <div class="w-12 h-12 rounded-full flex items-center justify-center text-white font-bold text-lg flex-shrink-0"
        [style.background]="memberColor(member.userId)">
        {{ member.displayName.charAt(0).toUpperCase() }}
      </div>

      <!-- Info -->
      <div class="flex-1 min-w-0">
        <div class="flex items-center gap-2">
          <p class="text-sm font-semibold text-gray-800 dark:text-gray-100 truncate">{{ member.displayName }}</p>
          <span *ngIf="member.role === 'admin'"
            class="text-xs px-2 py-0.5 rounded-full bg-primary-100 text-primary-700 dark:bg-primary-900 dark:text-primary-300 font-medium">
            Admin
          </span>
          <span *ngIf="member.userId === currentUserId"
            class="text-xs px-2 py-0.5 rounded-full bg-gray-100 text-gray-600 dark:bg-gray-700 dark:text-gray-300">
            You
          </span>
        </div>
        <p class="text-xs text-gray-400 dark:text-gray-500 truncate">{{ member.email }}</p>
        <p class="text-xs text-gray-400 dark:text-gray-500">Joined {{ formatDate(member.joinedAt) }}</p>
      </div>

      <!-- Admin Actions -->
      <button *ngIf="isAdmin() && member.userId !== currentUserId" mat-icon-button [matMenuTriggerFor]="menu">
        <mat-icon>more_vert</mat-icon>
      </button>
      <mat-menu #menu="matMenu">
        <button mat-menu-item (click)="toggleRole(member)">
          <mat-icon>{{ member.role === 'admin' ? 'person' : 'admin_panel_settings' }}</mat-icon>
          {{ member.role === 'admin' ? 'Make Member' : 'Make Admin' }}
        </button>
        <button mat-menu-item class="text-red-600" (click)="removeMember(member)">
          <mat-icon class="text-red-500">person_remove</mat-icon>
          Remove
        </button>
      </mat-menu>
    </div>
  </div>
</div>
