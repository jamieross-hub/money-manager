<!-- Settle Dialog -->
<app-common-header title="Record Settlement" (closeButtonClick)="cancel()"></app-common-header>

<app-common-body-content>
  <!-- Payer → Payee row (non-editable) -->
  <section class="main ">
    <div class="transfer-row">
      <div class="member-chip">
        <div class="chip-avatar" [style.background]="avatarColor(balance.fromUserId)">
          {{ avatar(balance.fromDisplayName) }}
        </div>
        <span class="chip-name">{{ balance.fromDisplayName }}</span>
        <span class="chip-role pays">Pays</span>
      </div>

      <div class="transfer-arrow">
        <mat-icon class="text-neutral-400 !text-xl">arrow_forward</mat-icon>
      </div>

      <div class="member-chip">
        <div class="chip-avatar" [style.background]="avatarColor(balance.toUserId)">
          {{ avatar(balance.toDisplayName) }}
        </div>
        <span class="chip-name">{{ balance.toDisplayName }}</span>
        <span class="chip-role receives">Receives</span>
      </div>
    </div>

    <form [formGroup]="form" (ngSubmit)="save()" class="dialog-body">

      <!-- Amount -->
      <div class="field-group">
        <label class="field-label">Amount (₹)</label>
        <div class="amount-wrapper">
          <span class="amount-currency">₹</span>
          <input type="number" formControlName="amount" class="amount-input" min="0.01" step="1" placeholder="0" />
        </div>
        <p class="field-hint">Suggested: ₹{{ data.suggestedAmount | number:'1.0-2' }}</p>
      </div>

      <!-- Payment Method -->
      <div class="field-group">
        <label class="field-label">Payment Method</label>
        <div class="method-grid">
          @for (m of methods; track m.value) {
            <button type="button" class="method-btn"
              [class.method-btn-active]="form.value.method === m.value" (click)="selectMethod(m.value)" matRipple>
              <mat-icon class="!text-xl mb-1">{{ m.icon }}</mat-icon>
              <span class="text-xs font-semibold">{{ m.label }}</span>
            </button>
          }
        </div>
      </div>

      <!-- Note (optional) -->
      <div class="field-group">
        <label class="field-label">Note <span class="text-neutral-400 font-normal">(optional)</span></label>
        <input type="text" formControlName="note" class="note-input" placeholder="e.g. Restaurant bill, petrol..."
          maxlength="120" />
      </div>

      <!-- Actions -->
      <div class="dialog-actions">
        <!-- <button type="button" class="btn-cancel" (click)="cancel()">Cancel</button> -->
        <button type="submit" mat-flat-button color="primary" class="btn-save" [disabled]="form.invalid">
          <mat-icon class="!text-base mb-1 mt-1 !h-[30px]">check_circle</mat-icon>
          Save Settlement
        </button>
      </div>
    </form>
  </section>
</app-common-body-content>
