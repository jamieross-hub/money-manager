<!-- App Shell -->
<!-- <app-shell></app-shell> -->

<!-- Offline Indicator -->
<app-offline-indicator></app-offline-indicator>

<!-- PWA Install Prompt -->
<app-pwa-install-prompt (installClicked)="onInstallClicked()" (dismissClicked)="onDismissClicked()">
</app-pwa-install-prompt>

<!-- Main App Content -->
<div [class.blur-sm]="isLocked">
  <app-loader></app-loader>
  <router-outlet></router-outlet>
</div>

<!-- Lock Screen Overlay -->
<div *ngIf="isLocked" class="lock-screen-overlay fixed inset-0 z-[9999] flex flex-col items-center justify-center bg-white/80 dark:bg-gray-900/80 backdrop-blur-md">
  <div class="lock-card bg-white dark:bg-gray-800 p-8 rounded-3xl shadow-2xl border border-gray-200 dark:border-gray-700 text-center max-w-sm mx-auto">
    <div class="w-20 h-20 bg-primary-100 dark:bg-primary-900/30 rounded-full flex items-center justify-center mx-auto mb-6">
      <mat-icon class="!text-5xl !w-12 !h-12 text-primary-600 dark:text-primary-400">fingerprint</mat-icon>
    </div>
    <h2 class="text-2xl font-bold text-gray-900 dark:text-white mb-2">App Locked</h2>
    <p class="text-gray-500 dark:text-gray-400 mb-8">Authentication required to access Money Manager</p>
    
    <button mat-raised-button color="primary" (click)="promptBiometric()" class="!h-12 !px-8 !rounded-xl !text-lg w-full">
      <mat-icon class="mr-2">lock_open</mat-icon>
      Unlock App
    </button>
  </div>
</div>
