<div class="dashboard-wrapper safe-h-screen flex flex-col">
  <!-- Fixed Header -->
  @defer (on timer(200ms)) {
  <app-header class="dashboard-header"></app-header>
  }

  <!-- Scrollable Content Area -->
  <main #mainContent class="main-content flex-1 overflow-y-auto h-[inherit]">
    <div class="dashboard-container mx-auto px-4 py-1 lg:p-0 h-full max-h-full">
      <router-outlet></router-outlet>
    </div>
  </main>

  <!-- Fixed Footer -->
  @defer (on timer(400ms)) {
  <app-footer class="dashboard-footer"></app-footer>
  }
</div>
