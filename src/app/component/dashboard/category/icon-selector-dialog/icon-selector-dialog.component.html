<div class="bottom-sheet-container flex flex-col h-full max-h-[85vh]">
  <!-- Header Area -->
  <div class="px-5 pt-4 pb-2 bg-white dark:bg-gray-800 rounded-t-3xl sticky top-0 z-20">
    <!-- Drag Handle Indicator -->
    <div class="flex justify-center mb-4">
      <div
        class="w-12 h-1.5 bg-gray-200 dark:bg-gray-700 rounded-full cursor-pointer hover:bg-gray-300 transition-colors"
        (click)="onCancel()"></div>
    </div>

    <!-- <div class="flex items-center justify-between mb-4">
      <p class="text-xl font-bold text-gray-900 dark:text-white">Choose Icon</p>
      <button mat-icon-button (click)="onCancel()" class="text-gray-400 hover:text-gray-600 dark:hover:text-gray-200"
        aria-label="Close">
        <mat-icon>close</mat-icon>
      </button>
    </div> -->

    <!-- Enhanced Search Bar -->
    <div class="mb-4">
      <div class="relative flex items-center group">
        <mat-icon
          class="absolute left-4 text-gray-400 group-focus-within:text-primary transition-colors duration-200">search</mat-icon>
        <input type="text" [(ngModel)]="searchTerm" (input)="onSearchChange()" placeholder="Search from 100+ icons..."
          class="w-full bg-gray-50 dark:bg-gray-700/50 border-2 border-transparent focus:border-primary/20 focus:bg-white dark:focus:bg-gray-700 rounded-2xl py-3.5 pl-12 pr-12 text-sm outline-none transition-all duration-200 dark:text-gray-100 placeholder:text-gray-400"
          autocomplete="off" spellcheck="false" />
        <button *ngIf="searchTerm" mat-icon-button (click)="clearSearch()"
          class="absolute right-2 text-gray-400 hover:text-gray-600" type="button" aria-label="Clear search">
          <mat-icon class="text-lg">cancel</mat-icon>
        </button>
      </div>
    </div>
  </div>

  <!-- Icons Grid Container -->
  <div class="overflow-y-auto px-5 pb-12 flex-1 pt-2">
    <div *ngIf="filteredIcons && filteredIcons.length === 0"
      class="flex flex-col items-center justify-center py-16 text-gray-400">
      <mat-icon class="text-6xl opacity-20 mb-4">search_off</mat-icon>
      <p class="text-base font-medium">No matching icons found</p>
      <button mat-flat-button color="primary" (click)="clearSearch()" class="mt-4 rounded-xl px-6">
        Clear Search
      </button>
    </div>

    <div *ngIf="filteredIcons && filteredIcons.length > 0" class="icons-grid-custom">
      <button *ngFor="let icon of filteredIcons; trackBy: trackByIcon" type="button" (click)="selectIcon(icon)"
        class="icon-option-custom flex flex-col items-center justify-center p-3 rounded-2xl transition-all duration-200"
        [class.selected-icon]="selectedIcon === icon" [attr.aria-label]="'Select ' + icon + ' icon'"
        [attr.aria-selected]="selectedIcon === icon">
        <mat-icon class="text-3xl mb-1.5">{{ icon }}</mat-icon>
        <span class="text-[9px] font-bold uppercase tracking-widest text-gray-400 text-center truncate w-full px-1">{{
          icon.replace('_', ' ') }}</span>
      </button>
    </div>
  </div>
</div>
