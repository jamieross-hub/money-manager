<div class="flex flex-col h-full max-h-[80vh]">
    <!-- Header with Drag Handle -->
    <div
        class="flex flex-col items-center pt-2 pb-4 px-4 bg-white dark:bg-gray-800 rounded-t-xl sticky top-0 z-10 w-full">
        <!-- Drag Handle -->
        <div class="w-12 h-1.5 bg-gray-300 dark:bg-gray-600 rounded-full mb-4" (click)="close()"></div>

        <!-- <div class="flex items-center justify-end w-full mb-2">
            <button mat-icon-button (click)="close()" class="text-gray-500">
                <mat-icon>close</mat-icon>
            </button>
        </div> -->

        <!-- Search Bar -->
        <mat-form-field appearance="outline" class="w-full search-field">
            <mat-icon matPrefix class="text-gray-400 mr-2">search</mat-icon>
            <input matInput [formControl]="searchControl" placeholder="Search categories...">
            <button *ngIf="searchControl.value" matSuffix mat-icon-button aria-label="Clear"
                (click)="searchControl.setValue('')">
                <mat-icon>close</mat-icon>
            </button>
        </mat-form-field>
    </div>

    <!-- Category List -->
    <div class="overflow-y-auto px-2 pb-4">
        <mat-nav-list>
            <ng-container *ngFor="let category of filteredCategories$ | async">
                <mat-list-item (click)="selectCategory(category)"
                    class="rounded-lg mb-1 hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors cursor-pointer"
                    [class.bg-blue-50]="category.id === data.selectedCategoryId"
                    [class.dark:bg-blue-900]="category.id === data.selectedCategoryId && '20'">
                    <div matListItemIcon class="w-10 h-10 rounded-full flex items-center justify-center mr-4"
                        [style.background-color]="(category.color || '#cccccc') + '20'"
                        [style.color]="category.color || '#cccccc'">
                        <mat-icon>{{ category.icon }}</mat-icon>
                    </div>
                    <div matListItemTitle class="font-medium text-gray-800 dark:text-gray-200">
                        {{ category.name }}
                    </div>
                    <div matListItemMeta *ngIf="category.id === data.selectedCategoryId">
                        <mat-icon class="text-primary">check_circle</mat-icon>
                    </div>
                </mat-list-item>
            </ng-container>

            <div *ngIf="(filteredCategories$ | async)?.length === 0"
                class="flex flex-col items-center justify-center py-8 text-gray-500 dark:text-gray-400">
                <mat-icon class="text-4xl mb-2 opacity-50">category_off</mat-icon>
                <p>No categories found</p>
            </div>
        </mat-nav-list>
    </div>
</div>
