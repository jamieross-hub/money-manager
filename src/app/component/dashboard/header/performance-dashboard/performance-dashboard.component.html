<div class="performance-overlay" (click)="$event.stopPropagation()">
  <div class="header-row">
    <h3>Performance Metrics</h3>
    <button class="close-btn" (click)="resetNetwork()">Reset Net</button>
  </div>

  <div class="metrics-grid">
    <div class="metric-card" [class.low-fps]="metrics().fps < 30">
      <span class="label">FPS</span>
      <span class="value">{{ metrics().fps }}</span>
      <div class="fps-bar-container">
        <div class="fps-bar" [style.width.%]="(metrics().fps / 60) * 100"></div>
      </div>
    </div>

    <div class="metric-card" *ngIf="metrics().memoryUsage">
      <span class="label">Memory</span>
      <span class="value">{{ metrics().memoryUsage }} MB</span>
      <span class="sub-value">Total: {{ metrics().totalJSHeapSize }} MB</span>
    </div>

    <div class="metric-card">
      <span class="label">Network</span>
      <span class="value">{{ metrics().networkRequests }}</span>
      <span class="sub-value">Resource Requests</span>
    </div>

    <div class="metric-card" [class.sw-active]="metrics().swStatus === 'Activated'">
      <span class="label">SW Status</span>
      <span class="value">{{ metrics().swStatus }}</span>
    </div>
  </div>

  <div class="footer-info">
    <span>CPU: Estimated based on FPS stability</span>
  </div>
</div>
