<section class="py-16 bg-white relative z-20">
    <div class="container mx-auto px-4 sm:px-6 lg:px-8">
        <div class="max-w-2xl mx-auto text-center mb-10">
            <h2 class="text-3xl font-bold text-gray-900 mb-4">Get in Touch</h2>
            <p class="text-gray-600">
                Have questions? suggestions? or just want to say hi? We'd love to hear from you.
            </p>
        </div>

        <div class="max-w-xl mx-auto bg-white p-8 rounded-2xl shadow-lg border border-gray-100">
            <form [formGroup]="contactForm" (ngSubmit)="onSubmit()" class="space-y-6">

                <!-- Name -->
                <div>
                    <label for="name" class="block text-sm font-medium text-gray-700 mb-1">Name</label>
                    <input type="text" id="name" formControlName="name"
                        class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition-all duration-200"
                        placeholder="Your name"
                        [class.border-red-500]="contactForm.get('name')?.invalid && contactForm.get('name')?.touched">
                    <div *ngIf="contactForm.get('name')?.invalid && contactForm.get('name')?.touched"
                        class="text-red-500 text-xs mt-1">
                        Name is required
                    </div>
                </div>

                <!-- Email -->
                <div>
                    <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                    <input type="email" id="email" formControlName="email"
                        class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition-all duration-200"
                        placeholder="you@example.com"
                        [class.border-red-500]="contactForm.get('email')?.invalid && contactForm.get('email')?.touched">
                    <div *ngIf="contactForm.get('email')?.invalid && contactForm.get('email')?.touched"
                        class="text-red-500 text-xs mt-1">
                        Valid email is required
                    </div>
                </div>

                <!-- Message -->
                <div>
                    <label for="message" class="block text-sm font-medium text-gray-700 mb-1">Message</label>
                    <textarea id="message" formControlName="message" rows="4"
                        class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition-all duration-200 resize-none"
                        placeholder="How can we help you?"
                        [class.border-red-500]="contactForm.get('message')?.invalid && contactForm.get('message')?.touched"></textarea>
                    <div *ngIf="contactForm.get('message')?.invalid && contactForm.get('message')?.touched"
                        class="text-red-500 text-xs mt-1">
                        Message must be at least 10 characters
                    </div>
                </div>

                <!-- Submit Button -->
                <button type="submit" [disabled]="contactForm.invalid || isLoading"
                    class="w-full bg-primary hover:bg-primary-700 text-white font-bold py-3 px-6 rounded-xl transition-colors duration-300 disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center space-x-2">
                    <span *ngIf="!isLoading">Send Message</span>
                    <span *ngIf="isLoading" class="flex items-center">
                        <svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg"
                            fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4">
                            </circle>
                            <path class="opacity-75" fill="currentColor"
                                d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
                            </path>
                        </svg>
                        Sending...
                    </span>
                </button>

            </form>
        </div>
    </div>
</section>
