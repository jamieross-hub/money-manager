<mat-card class="trend-card">
    <div class="trend-header">
        <div class="title-section">
            <h3 class="card-title text-uppercase">{{ chartTitle }}</h3>
            <div class="metrics-row">
                <div class="metric-item">
                    <span class="dot income-dot"></span>
                    <span class="label">Income:</span>
                    <span class="value">{{ totalIncome | currency }}</span>
                </div>
                <div class="metric-item">
                    <span class="dot expense-dot"></span>
                    <span class="label">Expenses:</span>
                    <span class="value text-red-600">{{ totalExpenses | currency }}</span>
                </div>
            </div>
        </div>
        <div class="action-section">
            <div class="toggle-group">
                <button mat-icon-button [class.active]="chartType === 'line'" (click)="toggleChartType('line')"
                    matTooltip="Line Chart">
                    <mat-icon>show_chart</mat-icon>
                </button>
                <button mat-icon-button [class.active]="chartType === 'bar'" (click)="toggleChartType('bar')"
                    matTooltip="Bar Chart">
                    <mat-icon>bar_chart</mat-icon>
                </button>
            </div>
        </div>
    </div>

    <mat-card-content class="!p-0">
        <!-- Chart removed -->
        <div class="p-6 text-center text-gray-500 italic">
            Chart visualization has been disabled to improve performance.
        </div>
        <p class="chart-footer text-center mt-2">{{ chartFooter }}</p>
    </mat-card-content>
</mat-card>
