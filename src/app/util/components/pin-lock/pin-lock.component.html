@if (isLocked) {
  <div class="fixed inset-0 z-[9999] flex items-center justify-center bg-white/90 dark:bg-gray-900/90 backdrop-blur-lg">
    <div class="w-full max-w-sm p-8 text-center">
      <div class="mb-8">
        <div class="w-20 h-20 bg-primary-100 dark:bg-primary-900/30 rounded-full flex items-center justify-center mx-auto mb-4">
          <mat-icon class="text-primary-600 dark:text-primary-400">lock</mat-icon>
        </div>
        <h2 class="text-2xl font-bold dark:text-white mb-2">App Locked</h2>
        <p class="text-gray-500 dark:text-gray-400">Please enter your PIN to continue</p>
      </div>
      <!-- PIN Display Dots -->
      <div class="flex justify-center gap-4 mb-10">
        @for (i of [0,1,2,3]; track i) {
          <div
            class="w-4 h-4 rounded-full border-2 border-primary-500"
            [class.bg-primary-500]="enteredPin.length > i">
          </div>
        }
      </div>
      <!-- Number Pad -->
      <div class="grid grid-cols-3 gap-6 max-w-[280px] mx-auto">
        @for (num of [1,2,3,4,5,6,7,8,9]; track num) {
          <button
            (click)="onPinDigit(num.toString())"
            class="w-16 h-16 rounded-full text-2xl font-semibold hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors dark:text-white">
            {{num}}
          </button>
        }
        <button (click)="onPinClear()" class="w-16 h-16 rounded-full flex items-center justify-center hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors">
          <mat-icon class="text-gray-400">backspace</mat-icon>
        </button>
        <button (click)="onPinDigit('0')" class="w-16 h-16 rounded-full text-2xl font-semibold hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors dark:text-white">0</button>
        <button (click)="logout()" class="w-16 h-16 rounded-full flex items-center justify-center hover:bg-red-50 dark:hover:bg-red-900/20 text-red-500 transition-colors">
          <mat-icon>logout</mat-icon>
        </button>
      </div>
      @if (pinError) {
        <p class="mt-6 text-red-500 text-sm font-medium animate-bounce">{{pinError}}</p>
      }
    </div>
  </div>
}
