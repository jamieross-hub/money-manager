<div class="chat-category-dropdown">
  <!-- <label style="display:block;margin-bottom:6px;color:#374151">{{placeholder}}</label> -->
   <mat-select style="min-width:200px" (selectionChange)="onChange($event.value)" placeholder="{{placeholder}}">
    @for (category of categories; track category) {
      <mat-option [value]="category">{{category.name}}</mat-option>
    }
  </mat-select>
</div>
