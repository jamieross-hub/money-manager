<div
  class="px-4 py-4 pb-2  rounded-2xl max-w-[80%] sm:max-w-[60%] text-sm sm:text-base bg-gray-100 text-gray-800 rounded-bl-md bg-white"
  style="-webkit-user-select: text; -moz-user-select: text; -ms-user-select: text; user-select: text;">


  <div class="chat-category-dropdown">
    <div class="chat-controls" role="group" aria-label="Select account and category">
      <mat-form-field appearance="outline" class="select-pill account-pill w-full">
        <mat-select [disabled]="isDisabled" (selectionChange)="onAccountChange($event.value)"
          placeholder="Select account" panelClass="chat-select-panel">
          <mat-option *ngFor="let acc of (accountList$ | async)" [value]="acc">
            <div class="option-item">
              <span class="label">{{acc.name}}</span>
            </div>
          </mat-option>
        </mat-select>
      </mat-form-field>

      <mat-form-field appearance="outline" class="select-pill category-pill w-full">
        <mat-select [disabled]="isDisabled" (selectionChange)="onChange($event.value)" placeholder="{{placeholder}}"
          panelClass="chat-select-panel">
          <mat-option *ngFor="let category of categories" [value]="category">
            <div class="option-item">
              <span class="label">{{category.name}}</span>
            </div>
          </mat-option>
        </mat-select>
      </mat-form-field>

      <!-- <button mat-mini-fab color="primary" class="submit-btn" aria-label="Submit selection" (click)="onSubmit()" [disabled]="!currentCategory || !currentAccount">
      <mat-icon>send</mat-icon>
    </button> -->
    </div>
  </div>
</div>
