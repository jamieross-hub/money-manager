name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install Dependencies
        run: npm install --force

      - name: Build Angular app
        run: npm run build
        env:
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
          FIREBASE_MEASUREMENT_ID: ${{ secrets.FIREBASE_MEASUREMENT_ID }}
          VAPID_KEY: ${{ secrets.VAPID_KEY }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          CONTACT_SPREADSHEET_ID: ${{ secrets.CONTACT_SPREADSHEET_ID }}

      - name: Upload artifact for GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/money-manager/browser

      # ❌ Slack on build failure
      - name: Notify Slack on build failure
        if: failure()
        run: |
          curl -X POST -H 'Content-type: application/json' \
          --data "{
            \"text\": \"❌ *Build Failed*\n\
            *Repo:* ${{ github.repository }}\n\
            *Branch:* ${{ github.ref_name }}\n\
            *Commit:* <${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|View Commit>\n\
            *Logs:* <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Logs>\"
          }" \
          ${{ secrets.SLACK_WEBHOOK_URL }}

  deploy:
    needs: build-deploy
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4

      # ✅ Slack on successful deploy
      - name: Notify Slack on success
        if: success()
        run: |
          curl -X POST -H 'Content-type: application/json' \
          --data "{
            \"text\": \"✅ *Deployment Successful!*\n\
            *Repo:* ${{ github.repository }}\n\
            *Branch:* ${{ github.ref_name }}\n\
            *Live URL:* <https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}>\n\
            *Commit:* <${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|View Commit>\"
          }" \
          ${{ secrets.SLACK_WEBHOOK_URL }}

      # ❌ Slack on deploy failure
      - name: Notify Slack on deploy failure
        if: failure()
        run: |
          curl -X POST -H 'Content-type: application/json' \
          --data "{
            \"text\": \"❌ *Deployment Failed*\n\
            *Repo:* ${{ github.repository }}\n\
            *Branch:* ${{ github.ref_name }}\n\
            *Logs:* <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Logs>\"
          }" \
          ${{ secrets.SLACK_WEBHOOK_URL }}
